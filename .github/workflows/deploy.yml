name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # 本项目 engines 要求 node >= 20。
          # GitHub Actions 上偶现 npm "Exit handler never called"，这里固定到 Node 20 + 较稳定的 npm 版本，提升可复现性。
          node-version: 20
          cache: npm

      - name: Pin npm version (workaround for npm "Exit handler never called" on runners)
        run: npm i -g npm@10.2.4

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build website
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
